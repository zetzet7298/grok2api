services:
  grok2api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grok2api
    ports:
      - "${HOST_PORT:-8011}:${SERVER_PORT:-8000}"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_WORKERS: ${SERVER_WORKERS:-1}
      SERVER_STORAGE_TYPE: ${SERVER_STORAGE_TYPE:-local}
      SERVER_STORAGE_URL: ${SERVER_STORAGE_URL:-}
      FLARESOLVERR_URL: http://flaresolverr:8191
      CF_REFRESH_INTERVAL: "600"
      CF_TIMEOUT: "60"
    command:
      - sh
      - -c
      - >
        granian --interface asgi --host "${SERVER_HOST:-0.0.0.0}"
        --port "${SERVER_PORT:-8000}" --workers "${SERVER_WORKERS:-1}" main:app
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    depends_on:
      - flaresolverr
    networks:
      - backend

  flaresolverr:
    container_name: flaresolverr
    image: ghcr.io/flaresolverr/flaresolverr:latest
    ports:
      - "127.0.0.1:8191:8191"
    environment:
      TZ: Asia/Shanghai
      LOG_LEVEL: info
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge
